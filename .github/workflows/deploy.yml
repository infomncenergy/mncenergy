name: Deploy to IONOS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    # Runs on YOUR Windows machine via the self-hosted runner
    runs-on: self-hosted

    steps:
      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: npm install

      # 3. Build the Vite app (outputs to ./dist)
      - name: Build
        run: npm run build

      # 4. Deploy dist/ to IONOS via FTP
      # Runs from your Windows IP so IONOS firewall allows it
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
